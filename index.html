<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MrBeast Gift Card</title>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&family=Permanent+Marker&family=Poppins:wght@700;800;900&display=swap" rel="stylesheet">
    <style>
        :root { --mrbeast-blue: #00AEEF; --mrbeast-red: #FF0000; }
        
        body { 
            margin: 0; 
            font-family: 'Poppins', sans-serif; 
            color: #111; 
            text-align: center; 
            min-height: 100vh; 
            overflow-x: hidden;
            background-color: #00AEEF;
        }

        /* --- BACKGROUND LAYER --- */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0; 
            background-color: #00AEEF;
            background-image: url('./imagesss/wbbg.png');
            background-size: cover; 
            background-position: 0 center;
            background-repeat: repeat-x; 
            z-index: -1; 
            animation: slideDesktop 10000s linear infinite; 
        }

        @keyframes slideDesktop {
            0% { background-position: 0px center; }
            100% { background-position: -2000000px center; } 
        }

        .language-switcher { position: absolute; top: 15px; right: 15px; z-index: 9999; }
        
        .mrbeast-hero { position: relative; padding: 15px 0 0; margin-bottom: 0px; z-index: 2; }
        
        .mrbeast-logo-top { width: 100px; margin-bottom: 0px; position: relative; z-index: 2; }
        
        /* --- TEXT STYLES (FIXED OVERLAPPING) --- */
        .mrbeast-text-group { display: flex; flex-direction: column; align-items: center; }

        .mrbeast-text-group h1 { 
            font-family: 'Permanent Marker', cursive; 
            font-size: 3.3rem; 
            font-weight: 400; 
            color: #000; 
            margin: 0 0 8px 0; /* THODA GAP ADD KIYA HAI NEECHE */
            line-height: 1.1; 
        }
        
        .mrbeast-text-group p { 
            font-family: 'Luckiest Guy', cursive; 
            font-size: 2.1rem; 
            font-weight: 400;
            color: #000; 
            margin: 0; /* NEGATIVE MARGIN (-4PX) HATA DIYA */
            letter-spacing: 2px;
            line-height: 1.1;
        }
        
        .user-info { 
            font-family: 'Poppins', sans-serif;
            font-size: 1rem; 
            font-weight: 900; 
            color: #111; 
            margin: 5px 0 5px 0; 
            white-space: nowrap; 
        }
        .user-info strong, .user-info #currentDate { color: var(--mrbeast-red); font-weight: 900; }
        
        /* --- CARDS LAYOUT --- */
        .cards { 
            display: grid; 
            grid-template-columns: repeat(14, 1fr); 
            justify-content: center; 
            gap: 10px; 
            padding: 10px 20px 20px 20px; 
            max-width: 2000px; 
            margin: auto; 
            position: relative; 
            z-index: 1; 
        }
        
        .card { background: white; border-radius: 12px; box-shadow: 0 8px 15px rgba(0, 0, 0, 0.2); overflow: hidden; border: 1px solid #ddd; transition: 0.3s; cursor: pointer; }
        .card img { width: 100%; height: auto; display: block; object-fit: contain; }
        .card:hover { transform: translateY(-5px) scale(1.05); }

        /* --- 1440px to 1920px SCREENS --- */
        @media (max-width: 1920px) {
            .cards { grid-template-columns: repeat(8, 1fr); gap: 12px; max-width: 1220px; padding: 5px 20px 20px 20px; }
        }

        /* --- MEDIUM DESKTOP --- */
        @media (max-width: 1300px) {
            .cards { grid-template-columns: repeat(6, 1fr); max-width: 1000px; }
        }

        /* --- LAPTOP BREAKPOINT --- */
        @media (max-width: 1050px) {
            .cards { grid-template-columns: repeat(5, 1fr); gap: 16px; max-width: 860px; }
            .mrbeast-text-group h1 { font-size: 2.8rem; }
            .mrbeast-text-group p { font-size: 1.8rem; }
        }

        /* --- TABLET BREAKPOINT --- */
        @media (max-width: 850px) {
            .cards { grid-template-columns: repeat(4, minmax(0, 142px)); max-width: 100%; gap: 14px; }
        }

        /* --- SMALL TABLET --- */
        @media (max-width: 650px) {
            .cards { grid-template-columns: repeat(3, minmax(0, 142px)); gap: 12px; }
            .mrbeast-text-group h1 { font-size: 2.5rem; }
            .mrbeast-text-group p { font-size: 1.6rem; }
        }

        /* --- REGULAR MOBILE PHONES --- */
        @media (max-width: 480px) { 
            .language-switcher { top: 10px; right: 10px; transform: scale(0.85); transform-origin: top right; }
            .mrbeast-hero { padding-top: 45px; margin-bottom: 5px; } 

            .mrbeast-logo-top { width: 90px; } 
            
            /* FIXED OVERLAP FOR MOBILE */
            .mrbeast-text-group h1 { font-size: 2.5rem; line-height: 1.1; margin-bottom: 5px; } 
            .mrbeast-text-group p { font-size: 1.6rem; letter-spacing: 1px; } 
            
            .user-info { font-size: 0.85rem; margin: 5px 0 10px 0; white-space: normal; line-height: 1.4; padding: 0 5px; }

            .cards { grid-template-columns: repeat(2, minmax(0, 142px)); gap: 15px; padding: 10px; } 
        }

        /* --- EXTRA SMALL MOBILE --- */
        @media (max-width: 360px) {
            .language-switcher { transform: scale(0.7); right: 5px; top: 8px; }
            .mrbeast-hero { padding-top: 50px; }
            .mrbeast-logo-top { width: 85px; } 
            
            /* FIXED OVERLAP FOR SMALL MOBILE */
            .mrbeast-text-group h1 { font-size: 2.2rem; margin-bottom: 5px; } 
            .mrbeast-text-group p { font-size: 1.4rem; } 
            
            .user-info { font-size: 0.75rem; margin: 5px 0 10px 0; white-space: normal; line-height: 1.4; padding: 0 5px; }
            
            .cards { grid-template-columns: repeat(2, minmax(0, 125px)); gap: 12px; padding: 10px; }
        }
    </style>
</head>

    <!-- NEW SCRIPT FOR URL HIDING -->
    <script>
        function openCard(imgSrc) {
            localStorage.setItem('selectedCard', imgSrc);
            window.location.href = 'getnow.html';
        }
    </script>

    <script>
        function updateOnlineUsers() {
            const el = document.getElementById('onlineUsers');
            if(!el) return;
            let current = parseInt(el.innerText);
            let newValue = current + (Math.floor(Math.random() * 11) - 5);
            if(newValue < 250) newValue = 280; if(newValue > 350) newValue = 310;
            el.innerText = newValue;
            
            const d = new Date();
            const month = d.toLocaleString('en-US', { month: 'short' });
            const day = d.getDate();
            const year = d.getFullYear();
            const dateEl = document.getElementById('currentDate');
            if(dateEl) dateEl.innerText = `${month} ${day} ${year}`;
        }
        setInterval(updateOnlineUsers, 5000); updateOnlineUsers();
    </script>
